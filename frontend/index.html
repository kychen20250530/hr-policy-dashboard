<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="公務人事政策評論系統 — 即時掃瞄各國政府公務員制度與實務變革，深度研究、觀點分析、撰寫評論。">
    <title>公務人事政策評論系統</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800&family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <!-- Sidebar Navigation -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo-container">
                <div class="logo-icon">
                    <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect width="40" height="40" rx="12" fill="url(#logoGrad)"/>
                        <path d="M13 28c0-3 2-5 4-7 2-2 3-4 3-6s1-3 0-3c-1 0-2 1-2 3h-2c0-3 1.5-5 4-5s4 2 4 5c0 2-1 4-3 6-2 2-4 4-4 7h8v2H13v-2z" fill="white" opacity="0.85"/>
                        <circle cx="27" cy="12" r="2" fill="#fef3c7"/>
                        <path d="M10 30h20" stroke="white" stroke-width="1.5" opacity="0.4"/>
                        <defs>
                            <linearGradient id="logoGrad" x1="0" y1="0" x2="40" y2="40">
                                <stop stop-color="#4e8750"/>
                                <stop offset="1" stop-color="#3d6e3f"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <div class="logo-text">
                    <span class="logo-title">人事政策</span>
                    <span class="logo-subtitle">評論系統</span>
                </div>
            </div>
            <button class="sidebar-toggle" id="sidebarToggle" aria-label="切換側邊欄">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
            </button>
        </div>

        <nav class="sidebar-nav" id="sidebarNav">
            <a href="#" class="nav-item active" data-page="dashboard">
                <span class="nav-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 6v6l4 2"/>
                    </svg>
                </span>
                <span class="nav-text">掃瞄監控</span>
                <span class="nav-badge" id="dashboardBadge" style="display:none;">0</span>
            </a>
            <a href="#" class="nav-item" data-page="review">
                <span class="nav-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 11l3 3L22 4"/>
                        <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
                    </svg>
                </span>
                <span class="nav-text">待審核</span>
                <span class="nav-badge" id="reviewBadge">12</span>
            </a>
            <a href="#" class="nav-item" data-page="topics">
                <span class="nav-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/>
                        <line x1="7" y1="7" x2="7.01" y2="7"/>
                    </svg>
                </span>
                <span class="nav-text">議題管理</span>
            </a>
            <a href="#" class="nav-item" data-page="knowledge">
                <span class="nav-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 19.5A2.5 2.5 0 016.5 17H20"/>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/>
                        <line x1="8" y1="7" x2="16" y2="7"/>
                        <line x1="8" y1="11" x2="14" y2="11"/>
                    </svg>
                </span>
                <span class="nav-text">知識庫</span>
            </a>

            <div class="nav-divider"></div>

            <a href="#" class="nav-item" data-page="settings">
                <span class="nav-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
                    </svg>
                </span>
                <span class="nav-text">系統設定</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="user-profile">
                <div class="user-avatar">KC</div>
                <div class="user-info">
                    <span class="user-name">系統管理員</span>
                    <span class="user-role">Administrator</span>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
        <!-- Header -->
        <header class="header" id="header">
            <div class="header-left">
                <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="開啟選單">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <line x1="3" y1="6" x2="21" y2="6"/>
                        <line x1="3" y1="12" x2="21" y2="12"/>
                        <line x1="3" y1="18" x2="21" y2="18"/>
                    </svg>
                </button>
                <h1 class="page-title" id="pageTitle">掃瞄監控</h1>
            </div>
            <div class="header-right">
                <div class="search-box" id="globalSearch">
                    <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                    <input type="text" placeholder="搜尋新聞、議題、知識..." id="globalSearchInput">
                    <kbd class="search-shortcut">⌘K</kbd>
                </div>
                <button class="header-btn notification-btn" id="notificationBtn" aria-label="通知">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                        <path d="M13.73 21a2 2 0 01-3.46 0"/>
                    </svg>
                    <span class="notification-count" id="notificationCount">3</span>
                </button>
                <button class="header-btn theme-toggle" id="themeToggle" aria-label="切換主題">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
                    </svg>
                </button>
                <div class="header-time" id="headerTime"></div>
            </div>
        </header>

        <!-- Page Content Panels -->
        <div class="content-wrapper">
            <!-- Dashboard Page -->
            <section class="page-panel active" id="page-dashboard">
                <div id="dashboardContainer"></div>
            </section>

            <!-- Review Page -->
            <section class="page-panel" id="page-review">
                <div id="reviewContainer"></div>
            </section>

            <!-- Topics Page -->
            <section class="page-panel" id="page-topics">
                <div id="topicsContainer"></div>
            </section>

            <!-- Knowledge Page -->
            <section class="page-panel" id="page-knowledge">
                <div id="knowledgeContainer"></div>
            </section>

            <!-- Settings Page -->
            <section class="page-panel" id="page-settings">
                <div class="grid" style="grid-template-columns: 1fr 1fr; gap: var(--sp-4); max-width: 960px;">
                    <!-- 掃瞄設定 -->
                    <div class="card" style="border-top: 3px solid var(--primary);">
                        <div class="card-header" style="padding: var(--sp-3) var(--sp-4);">
                            <h3 style="font-size: var(--text-sm);">🔍 掃瞄設定</h3>
                        </div>
                        <div class="card-body" style="padding: var(--sp-3) var(--sp-4);">
                            <div class="setting-item" style="padding: var(--sp-2) 0;">
                                <div class="setting-info"><label>自動掃瞄頻率</label></div>
                                <select class="select" id="scanFrequency" style="width:130px;">
                                    <option value="30">每 30 分鐘</option>
                                    <option value="60" selected>每 1 小時</option>
                                    <option value="120">每 2 小時</option>
                                    <option value="360">每 6 小時</option>
                                    <option value="720">每 12 小時</option>
                                    <option value="1440">每 24 小時</option>
                                </select>
                            </div>
                            <div class="setting-item" style="padding: var(--sp-2) 0;">
                                <div class="setting-info"><label>相關度閾值</label></div>
                                <div class="flex items-center">
                                    <input type="range" class="range-input" min="0" max="100" value="60" id="relevanceThreshold">
                                    <span class="range-value" id="thresholdValue">60%</span>
                                </div>
                            </div>
                            <div class="setting-item" style="padding: var(--sp-2) 0;">
                                <div class="setting-info"><label>每輪掃瞄上限</label></div>
                                <select class="select" style="width:130px;">
                                    <option>20 篇</option>
                                    <option selected>50 篇</option>
                                    <option>100 篇</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- 通知設定 -->
                    <div class="card" style="border-top: 3px solid var(--info);">
                        <div class="card-header" style="padding: var(--sp-3) var(--sp-4);">
                            <h3 style="font-size: var(--text-sm);">🔔 通知設定</h3>
                        </div>
                        <div class="card-body" style="padding: var(--sp-3) var(--sp-4);">
                            <div class="setting-item" style="padding: var(--sp-2) 0;">
                                <div class="setting-info"><label>Telegram 通知</label></div>
                                <label class="toggle-switch">
                                    <input type="checkbox" id="telegramToggle" checked>
                                    <span class="toggle-slider"></span>
                                </label>
                            </div>
                            <div class="setting-item" style="padding: var(--sp-2) 0;">
                                <div class="setting-info"><label>Bot Token</label></div>
                                <input type="password" class="input" placeholder="貼上 Token..." id="telegramToken" style="width:160px;font-size:var(--text-xs);">
                            </div>
                            <div class="setting-item" style="padding: var(--sp-2) 0;">
                                <div class="setting-info"><label>Chat ID</label></div>
                                <input type="text" class="input" placeholder="頻道或群組 ID" style="width:160px;font-size:var(--text-xs);">
                            </div>
                        </div>
                    </div>

                    <!-- AI 分析設定 -->
                    <div class="card" style="border-top: 3px solid var(--secondary);">
                        <div class="card-header" style="padding: var(--sp-3) var(--sp-4);">
                            <h3 style="font-size: var(--text-sm);">🤖 AI 分析設定</h3>
                        </div>
                        <div class="card-body" style="padding: var(--sp-3) var(--sp-4);">
                            <div class="setting-item" style="padding: var(--sp-2) 0;">
                                <div class="setting-info"><label>優先 AI 工具</label></div>
                                <select class="select" id="aiTool" style="width:150px;">
                                    <option value="codex">Codex CLI</option>
                                    <option value="claude" selected>Free Claude Code</option>
                                    <option value="opencode">OpenCode</option>
                                </select>
                            </div>
                            <div class="setting-item" style="padding: var(--sp-2) 0;">
                                <div class="setting-info"><label>分析深度</label></div>
                                <select class="select" id="analysisDepth" style="width:150px;">
                                    <option value="brief">簡要摘要</option>
                                    <option value="standard" selected>標準分析</option>
                                    <option value="deep">深度報告</option>
                                </select>
                            </div>
                            <div class="setting-item" style="padding: var(--sp-2) 0;">
                                <div class="setting-info"><label>自動生成評論</label></div>
                                <label class="toggle-switch">
                                    <input type="checkbox">
                                    <span class="toggle-slider"></span>
                                </label>
                            </div>
                        </div>
                    </div>

                    <!-- 發布設定 -->
                    <div class="card" style="border-top: 3px solid var(--success);">
                        <div class="card-header" style="padding: var(--sp-3) var(--sp-4);">
                            <h3 style="font-size: var(--text-sm);">📤 發布設定</h3>
                        </div>
                        <div class="card-body" style="padding: var(--sp-3) var(--sp-4);">
                            <div class="setting-item" style="padding: var(--sp-2) 0;">
                                <div class="setting-info"><label>Blogger 發布</label></div>
                                <label class="toggle-switch">
                                    <input type="checkbox" id="bloggerToggle">
                                    <span class="toggle-slider"></span>
                                </label>
                            </div>
                            <div class="setting-item" style="padding: var(--sp-2) 0;">
                                <div class="setting-info"><label>Drive 歸檔</label></div>
                                <label class="toggle-switch">
                                    <input type="checkbox" id="driveToggle" checked>
                                    <span class="toggle-slider"></span>
                                </label>
                            </div>
                            <div class="setting-item" style="padding: var(--sp-2) 0;">
                                <div class="setting-info"><label>發布前需人工確認</label></div>
                                <label class="toggle-switch">
                                    <input type="checkbox" checked>
                                    <span class="toggle-slider"></span>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- 底部操作列 -->
                <div class="flex justify-end gap-3 mt-4" style="max-width:960px;">
                    <button class="btn btn-secondary btn-sm">重置預設</button>
                    <button class="btn btn-primary btn-sm" onclick="App.showToast('設定已儲存','success')">💾 儲存設定</button>
                </div>
            </section>
        </div>
    </main>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Modal Container -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modalContent">
            <!-- Dynamic modal content -->
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/app.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/review.js"></script>
    <script src="js/topics.js"></script>
    <script src="js/knowledge.js"></script>
</body>
</html>
